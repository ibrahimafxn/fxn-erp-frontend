@if (open()) {
  <div class="modal-backdrop" (click)="onBackdropClick()" (keydown)="onKeydown($event)" tabindex="-1">
    <div
      class="modal"
      role="dialog"
      aria-modal="true"
      [attr.aria-label]="dialogTitle()"
      (click)="$event.stopPropagation()"
    >
      <header class="modal-header">
        <div class="modal-title">{{ dialogTitle() }}</div>

        <button type="button" class="icon-btn" (click)="onCancel()" aria-label="Fermer">
          <i class="bi bi-x-lg"></i>
        </button>
      </header>

      <section class="modal-body">
        <p class="lead">
          {{ dialogQuestion() }}
        </p>

        <p class="hint">{{ dialogDangerHint() }}</p>

        @if (authorLabel()) {
          <div class="meta">
            <span class="label">Auteur</span>
            <span>{{ authorLabel() }}</span>
          </div>
        }

      </section>

      <footer class="modal-actions">
        <button type="button" class="btn-outline" (click)="onCancel()" [disabled]="confirming()">
          {{ cancelText() }}
        </button>

        <button type="button" class="btn-outline delete" [attr.title]="dialogConfirmText()" (click)="onConfirm()" [disabled]="confirming()">
          @if (dialogConfirmIcon()) { <i [class]="dialogConfirmIcon()"></i> }
          @if (confirming()) { {{ dialogConfirmLoadingText() }} } @else { {{ dialogConfirmText() }} }
        </button>
      </footer>
    </div>
  </div>
}
