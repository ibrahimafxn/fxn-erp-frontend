name: Frontend CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
      - name: Install deps
        run: npm ci
      - name: Run tests
        env:
          CHROME_BIN: google-chrome
        run: npm test -- --watch=false --browsers=ChromeHeadless
